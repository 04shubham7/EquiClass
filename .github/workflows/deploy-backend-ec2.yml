name: Deploy Backend To EC2

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "server/**"
      - "deploy/docker-compose.ec2.yml"
      - ".github/workflows/deploy-backend-ec2.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/equiclass-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
      EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
      EC2_MONGO_URI: ${{ secrets.EC2_MONGO_URI }}
      EC2_JWT_SECRET: ${{ secrets.EC2_JWT_SECRET }}
      EC2_JWT_EXPIRES_IN: ${{ secrets.EC2_JWT_EXPIRES_IN }}
      EC2_CORS_ORIGIN: ${{ secrets.EC2_CORS_ORIGIN }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate Required Secrets
        run: |
          test -n "$EC2_HOST" || { echo "Missing EC2_HOST"; exit 1; }
          test -n "$EC2_USERNAME" || { echo "Missing EC2_USERNAME"; exit 1; }
          test -n "$EC2_SSH_PRIVATE_KEY" || { echo "Missing EC2_SSH_PRIVATE_KEY"; exit 1; }
          test -n "$GHCR_USERNAME" || { echo "Missing GHCR_USERNAME"; exit 1; }
          test -n "$GHCR_PAT" || { echo "Missing GHCR_PAT"; exit 1; }
          test -n "$EC2_MONGO_URI" || { echo "Missing EC2_MONGO_URI"; exit 1; }
          test -n "$EC2_JWT_SECRET" || { echo "Missing EC2_JWT_SECRET"; exit 1; }
          test -n "$EC2_CORS_ORIGIN" || { echo "Missing EC2_CORS_ORIGIN"; exit 1; }

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Copy Compose File
        run: |
          ssh "$EC2_USERNAME@$EC2_HOST" "mkdir -p /opt/equiclass"
          scp deploy/docker-compose.ec2.yml "$EC2_USERNAME@$EC2_HOST:/opt/equiclass/docker-compose.yml"

      - name: Write Remote Environment File
        run: |
          cat > ec2.env <<EOF
          SERVER_IMAGE=${{ env.IMAGE_NAME }}:latest
          MONGO_URI=$EC2_MONGO_URI
          JWT_SECRET=$EC2_JWT_SECRET
          JWT_EXPIRES_IN=${EC2_JWT_EXPIRES_IN:-15m}
          CORS_ORIGIN=$EC2_CORS_ORIGIN
          EOF
          scp ec2.env "$EC2_USERNAME@$EC2_HOST:/opt/equiclass/.env"
          rm ec2.env

      - name: Deploy On EC2
        run: |
          ssh "$EC2_USERNAME@$EC2_HOST" "echo '$GHCR_PAT' | docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"
          ssh "$EC2_USERNAME@$EC2_HOST" "docker compose -f /opt/equiclass/docker-compose.yml --env-file /opt/equiclass/.env pull"
          ssh "$EC2_USERNAME@$EC2_HOST" "docker compose -f /opt/equiclass/docker-compose.yml --env-file /opt/equiclass/.env up -d"
