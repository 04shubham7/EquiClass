name: Deploy Frontend To Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "client/**"
      - ".github/workflows/deploy-frontend-vercel.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Check Vercel Configuration
        id: vercel-config
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Vercel deployment secrets are missing; skipping deploy job."
          fi

      - uses: actions/setup-node@v4
        if: steps.vercel-config.outputs.configured == 'true'
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: steps.vercel-config.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        if: steps.vercel-config.outputs.configured == 'true'
        run: vercel --cwd client pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy Frontend
        if: steps.vercel-config.outputs.configured == 'true'
        run: vercel --cwd client deploy --prod --token="$VERCEL_TOKEN"
