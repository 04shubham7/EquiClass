name: Deploy Frontend To Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "client/**"
      - ".github/workflows/deploy-frontend-vercel.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate Required Secrets
        run: |
          test -n "$VERCEL_TOKEN" || { echo "Missing VERCEL_TOKEN"; exit 1; }
          test -n "$VERCEL_ORG_ID" || { echo "Missing VERCEL_ORG_ID"; exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "Missing VERCEL_PROJECT_ID"; exit 1; }

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        working-directory: client

      - name: Build Frontend
        run: vercel build --prod --token="$VERCEL_TOKEN"
        working-directory: client

      - name: Deploy Frontend
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        working-directory: client
